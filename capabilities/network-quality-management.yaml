naftiko: 1.0.0-alpha2
info:
  label: Telefónica Network Quality Management
  description: Network quality management capability combining Telefónica's Quality on Demand and Device Roaming Status APIs.
    Enables application developers, IoT platform providers, and telecom integrators to guarantee network quality for specific
    device sessions and verify roaming status for compliance and geo-restriction workflows.
  tags:
  - Telefónica
  - Quality of Service
  - Network Management
  - IoT
  - Roaming
  - Mobile Network
  - CAMARA
  - Open Gateway
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TELEFONICA_ACCESS_TOKEN: TELEFONICA_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: telefonica-qod
    baseUri: https://opengateway.telefonica.com/v1
    description: Telefónica Quality on Demand API via Open Gateway.
    authentication:
      type: bearer
      token: '{{TELEFONICA_ACCESS_TOKEN}}'
    resources:
    - name: qod-sessions
      path: /qod/sessions
      description: Quality on Demand sessions.
      operations:
      - name: create-qod-session
        method: POST
        description: Create a QoD session for a device.
        body:
          type: json
          data:
            device: '{{tools.device}}'
            qosProfile: '{{tools.qosProfile}}'
            duration: '{{tools.duration}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: list-qod-sessions
        method: GET
        description: List active QoD sessions.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
      - name: get-qod-session
        method: GET
        description: Get details for a specific QoD session.
        inputParameters:
        - name: sessionId
          in: path
          type: string
          required: true
          description: Session UUID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-qod-session
        method: DELETE
        description: Terminate a QoD session.
        inputParameters:
        - name: sessionId
          in: path
          type: string
          required: true
          description: Session UUID to delete.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8081
    namespace: telefonica-network-api
    description: Unified REST API for Telefónica network quality management.
    resources:
    - path: /v1/qod/sessions
      name: qod-sessions
      description: Quality on Demand sessions.
      operations:
      - method: POST
        name: create-qod-session
        description: Create a QoD session for guaranteed network quality.
        call: telefonica-qod.create-qod-session
        with:
          device: rest.device
          qosProfile: rest.qosProfile
          duration: rest.duration
        outputParameters:
        - type: object
          mapping: $.
      - method: GET
        name: list-qod-sessions
        description: List active QoD sessions.
        call: telefonica-qod.list-qod-sessions
        outputParameters:
        - type: array
          mapping: $.
    - path: /v1/qod/sessions/{sessionId}
      name: qod-session
      description: A specific QoD session.
      operations:
      - method: GET
        name: get-qod-session
        description: Get QoD session details.
        call: telefonica-qod.get-qod-session
        with:
          sessionId: rest.sessionId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-qod-session
        description: Terminate a QoD session.
        call: telefonica-qod.delete-qod-session
        with:
          sessionId: rest.sessionId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9091
    namespace: telefonica-network-mcp
    transport: http
    description: MCP server for AI-assisted Telefónica network quality management.
    tools:
    - name: create-qod-session
      description: Create a Quality on Demand session to guarantee network bandwidth and latency for a device.
      hints:
        readOnly: false
      call: telefonica-qod.create-qod-session
      with:
        device: tools.device
        qosProfile: tools.qosProfile
        duration: tools.duration
      outputParameters:
      - type: object
        mapping: $.
    - name: list-qod-sessions
      description: List all active Quality on Demand sessions.
      hints:
        readOnly: true
      call: telefonica-qod.list-qod-sessions
      outputParameters:
      - type: array
        mapping: $.
    - name: get-qod-session
      description: Get status and details for a specific Quality on Demand session.
      hints:
        readOnly: true
      call: telefonica-qod.get-qod-session
      with:
        sessionId: tools.sessionId
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-qod-session
      description: Terminate an active Quality on Demand session.
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: telefonica-qod.delete-qod-session
      with:
        sessionId: tools.sessionId
      outputParameters:
      - type: object
        mapping: $.
