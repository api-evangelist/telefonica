naftiko: "1.0.0-alpha1"

info:
  label: "Telefónica Location Verification API"
  description: "Verify device presence within a geographic area using carrier network data."
  tags:
    - Telefónica
    - Location Verification
    - Location Services
    - Mobile Network
    - CAMARA
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELEFONICA_ACCESS_TOKEN: TELEFONICA_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: telefonica-location
      baseUri: https://opengateway.telefonica.com/v1
      description: "Telefónica Location Verification API via Open Gateway."
      authentication:
        type: bearer
        token: "{{TELEFONICA_ACCESS_TOKEN}}"
      resources:
        - name: location-verification
          path: /location-verification
          description: "Device location verification endpoint."
          operations:
            - name: verify-device-location
              method: POST
              description: "Verify whether a device is within a specified geographic area."
              body:
                type: json
                data:
                  device: "{{tools.device}}"
                  area: "{{tools.area}}"
                  maxAge: "{{tools.maxAge}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8104
      namespace: telefonica-location-rest
      resources:
        - path: /v1/location-verification/verify
          name: verify
          operations:
            - method: POST
              name: verify-device-location
              description: "Verify device location."
              call: "telefonica-location.verify-device-location"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: telefonica-location-mcp
      transport: http
      tools:
        - name: verify-device-location
          description: "Verify whether a Telefónica device is present within a specified geographic area (circle or polygon)."
          hints:
            readOnly: true
          call: "telefonica-location.verify-device-location"
          with:
            device: "tools.device"
            area: "tools.area"
            maxAge: "tools.maxAge"
          outputParameters:
            - type: object
              mapping: "$."
