naftiko: "1.0.0-alpha1"

info:
  label: "Telefónica Number Verification API"
  description: "Verify that a user's device is connected via the claimed phone number using carrier data."
  tags:
    - Telefónica
    - Number Verification
    - Authentication
    - Fraud Prevention
    - CAMARA
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELEFONICA_ACCESS_TOKEN: TELEFONICA_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: telefonica-number-verification
      baseUri: https://opengateway.telefonica.com/v1
      description: "Telefónica Number Verification API via Open Gateway."
      authentication:
        type: bearer
        token: "{{TELEFONICA_ACCESS_TOKEN}}"
      resources:
        - name: number-verification
          path: /number-verification
          description: "Mobile number verification endpoints."
          operations:
            - name: verify-phone-number
              method: POST
              description: "Verify that the device is connected via the specified phone number."
              body:
                type: json
                data:
                  phoneNumber: "{{tools.phoneNumber}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-phone-number
              method: POST
              description: "Get the phone number associated with the device connection."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: telefonica-number-verification-rest
      resources:
        - path: /v1/number-verification/verify
          name: verify
          operations:
            - method: POST
              name: verify-phone-number
              description: "Verify phone number against device connection."
              call: "telefonica-number-verification.verify-phone-number"
              with:
                phoneNumber: "rest.phoneNumber"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: telefonica-number-verification-mcp
      transport: http
      tools:
        - name: verify-phone-number
          description: "Verify a phone number matches the user's device SIM using Telefónica network data."
          hints:
            readOnly: true
          call: "telefonica-number-verification.verify-phone-number"
          with:
            phoneNumber: "tools.phoneNumber"
          outputParameters:
            - type: object
              mapping: "$."
