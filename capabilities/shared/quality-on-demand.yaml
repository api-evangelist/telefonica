naftiko: "1.0.0-alpha1"

info:
  label: "Telefónica Quality on Demand API"
  description: "Control mobile network quality for device sessions with guaranteed bandwidth and low latency."
  tags:
    - Telefónica
    - Quality of Service
    - Mobile Network
    - IoT
    - CAMARA
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELEFONICA_ACCESS_TOKEN: TELEFONICA_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: telefonica-qod
      baseUri: https://opengateway.telefonica.com/v1
      description: "Telefónica Quality on Demand API via Open Gateway."
      authentication:
        type: bearer
        token: "{{TELEFONICA_ACCESS_TOKEN}}"
      resources:
        - name: qod-sessions
          path: /qod/sessions
          description: "Quality on Demand sessions."
          operations:
            - name: create-qod-session
              method: POST
              description: "Create a QoD session for a device."
              body:
                type: json
                data:
                  device: "{{tools.device}}"
                  qosProfile: "{{tools.qosProfile}}"
                  duration: "{{tools.duration}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: list-qod-sessions
              method: GET
              description: "List active QoD sessions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: get-qod-session
              method: GET
              description: "Get details for a specific QoD session."
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: "Session UUID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-qod-session
              method: DELETE
              description: "Terminate a QoD session."
              inputParameters:
                - name: sessionId
                  in: path
                  type: string
                  required: true
                  description: "Session UUID to delete."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8105
      namespace: telefonica-qod-rest
      resources:
        - path: /v1/qod/sessions
          name: sessions
          operations:
            - method: POST
              name: create-qod-session
              description: "Create a QoD session."
              call: "telefonica-qod.create-qod-session"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-qod-sessions
              description: "List active QoD sessions."
              call: "telefonica-qod.list-qod-sessions"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9105
      namespace: telefonica-qod-mcp
      transport: http
      tools:
        - name: create-qod-session
          description: "Create a Quality on Demand session for a device with guaranteed network quality."
          hints:
            readOnly: false
          call: "telefonica-qod.create-qod-session"
          with:
            device: "tools.device"
            qosProfile: "tools.qosProfile"
            duration: "tools.duration"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-qod-sessions
          description: "List active QoD sessions."
          hints:
            readOnly: true
          call: "telefonica-qod.list-qod-sessions"
          outputParameters:
            - type: array
              mapping: "$."
        - name: delete-qod-session
          description: "Terminate a Quality on Demand session."
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "telefonica-qod.delete-qod-session"
          with:
            sessionId: "tools.sessionId"
          outputParameters:
            - type: object
              mapping: "$."
