specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Telefónica
providerId: telefonica
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telecommunications
  - Mobile Network
  - CAMARA
  - Open Gateway
  - Authentication
  - Fraud Prevention
  - Location Services
  - Rate Limiting
description: Rate-limit policy for the Telefónica Open Gateway is not enumerated on the public
  portal. CAMARA-aligned APIs follow the per-API specifications published by GSMA / CAMARA; the
  Telefónica sandbox applies its own throttling, and production limits are set per partner
  agreement.
sources:
  - https://opengateway.telefonica.com/
notes: The Open Gateway public portal does not list per-second / per-minute API limits. Sandbox
  throttling is applied behind sign-in; production limits are a partner-agreement parameter rather
  than a published value. CAMARA / GSMA per-API specs may carry recommended limits.
limits:
  - name: Sandbox Throttling
    scope: account
    metric: varies
    limit: see sandbox after registration
    notes: Sandbox limits are visible inside the developer hub once an account is created; not
      published in the public catalog.
  - name: Production Limits
    scope: partner-agreement
    metric: varies
    limit: see partner agreement
    notes: Production rate / quota limits are part of the bilateral partner contract.
policies:
  - name: CAMARA Conformance
    description: APIs follow the CAMARA / GSMA Open Gateway API specifications; consult the
      per-API CAMARA repository for any recommended client behavior.
  - name: Partner-Defined Production Limits
    description: Production-tier limits, including burst and sustained values, are issued through
      the Telefónica Partner Program agreement.
maintainers:
