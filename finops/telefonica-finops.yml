description: FOCUS-aligned FinOps shape for Telefónica Open Gateway. Open Gateway production
  consumption is billed under partner agreements rather than as a self-service consumption product;
  this artifact captures the publisher identity and a generic per-API-call meter pending visibility
  into the partner billing surface.
sources:
  - https://opengateway.telefonica.com/
notes: Telefónica does not publish a public consumption price list or usage-export surface for
  Open Gateway. FOCUS columns capture the publisher identity; the per-call meter is generic until
  partner-side billing detail is reconciled.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Telefónica, S.A.
serviceCategory: Telecommunications / Network APIs
billingModel:
  pricingCategory: Partner-Negotiated
  billingFrequency: Per-Invoice
  billingCurrency: EUR
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: Telefónica Open Gateway
  ServiceCategory: Telecommunications / Network APIs
  ProviderName: Telefónica
  PublisherName: Telefónica, S.A.
  InvoiceIssuerName: Telefónica, S.A.
  BillingCurrency: EUR
meters:
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - api
      - operator
      - country
principles:
  - name: Visibility
    description: Sandbox and partner production usage are reported through the Open Gateway
      developer hub and partner reporting; no public Telefónica spend dashboard is exposed for Open
      Gateway.
  - name: Allocation
    description: Allocation is by partner / aggregator, by CAMARA API (Number Verification, SIM
      Swap, etc.), and by operating-country footprint.
  - name: Optimization
    description: Optimization is contractual (partner agreement, country mix, batching); there are
      no published self-service committed-use discounts.
  - name: Accountability
    description: The integrating partner / aggregator is the accountable owner of Open Gateway
      production spend.
