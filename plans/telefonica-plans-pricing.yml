specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Telefónica
providerId: telefonica
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Telecommunications
  - Mobile Network
  - CAMARA
  - Open Gateway
  - Authentication
  - Fraud Prevention
  - Location Services
description: Telefónica exposes CAMARA-aligned network APIs through its Open Gateway program. The
  Open Gateway portal offers a free post-registration sandbox and routes production engagements
  through a Partner Program; there is no public per-call price card. Production commercial terms
  are negotiated between Telefónica and the integrating enterprise or aggregator.
sources:
  - https://opengateway.telefonica.com/
notes: Telefónica Open Gateway publishes a sandbox tier (free, registration required) and a partner
  / enterprise track ('HABLAR CON UN EXPERTO'). No public per-API price list is documented; the
  scaffold's synthetic Free / Pro / Enterprise tier numbers were removed in favor of a sandbox plan
  plus a Contact Sales plan.
plans:
  - id: telefonica-sandbox
    name: Open Gateway Sandbox
    type: freemium
    description: Free, registration-gated sandbox for testing CAMARA-aligned Open Gateway APIs
      (Number Verification, SIM Swap, Device Location, QoD, etc.) before partner / enterprise
      onboarding.
    entries:
      - label: Sandbox Access
        name: sandbox_access
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: EU
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: CAMARA-Aligned APIs
      - name: Developer Hub Access
      - name: Registration Required
  - id: telefonica-contact-sales
    name: Partner / Enterprise
    type: enterprise
    description: Production access to Open Gateway APIs is granted through the Telefónica Partner
      Program. Pricing, geographies, and operator footprint (Spain, Germany, Brazil, UK) are
      negotiated per agreement.
    entries:
      - label: Partner Agreement
        name: contact_sales
        type: flat
        metric: varies
        limit: -1
        timeFrame: usage
        geo: configurable
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Production CAMARA APIs
      - name: Multi-Operator Reach (via Partner Program)
      - name: Custom Commercial Terms
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
