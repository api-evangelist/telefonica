      - Financial Services
      - Mobile Security
    properties:
      - type: Documentation
        url: https://opengateway.telefonica.com/en/apis/line-tenure
  - aid: telefonica:population-density-data-api
    name: Telefónica Population Density Data API
    description: >-
      The Population Density Data API provides dynamic real-time data on
      population density in a specific geographic area and time window,
      derived from anonymized and aggregated mobile network data. Used for
      transport planning, event management, and retail analytics.
      Available in Spain.
    humanURL: https://opengateway.telefonica.com/en/apis/population-density-data
    baseURL: https://opengateway.telefonica.com
    tags:
