aid: telefonica
name: Telefónica
description: >-
  Telefónica is one of the world's leading telecommunications companies,
  operating in Europe and Latin America. Through its Open Gateway initiative,
  Telefónica exposes standardized network capabilities as APIs following the
  CAMARA (Cloud and Edge for Mobile Access and Real-time Execution) open
  standards developed by the GSMA. The Open Gateway APIs enable developers and
  enterprises to build applications leveraging Telefónica's network infrastructure
  for authentication, fraud prevention, location services, quality of service,
  and device management. APIs are available in Spain, Germany, Brazil, and the
  United Kingdom through the Telefónica Open Gateway sandbox and partner program.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Telecommunications
  - Mobile Network
  - CAMARA
  - Open Gateway
  - Authentication
  - Fraud Prevention
  - Location Services
